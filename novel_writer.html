<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小说家人味写作</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0b12;color:#c8c8c8;font-family:'PingFang SC','Segoe UI',sans-serif;min-height:100vh}
.cont{max-width:960px;margin:0 auto;padding:16px}
h1{text-align:center;padding:16px 0 0;font-size:1.5rem;color:#e8d5a3;letter-spacing:2px}
.sub{text-align:center;color:#5a5a6e;font-size:.8rem;margin-bottom:16px}
.panel{background:#12121c;border:1px solid #1e1e2e;border-radius:8px;padding:16px;margin-bottom:12px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.row:last-child{margin-bottom:0}
.col{flex:1;min-width:130px}
.col2{flex:2;min-width:180px}
.col3{flex:3;min-width:220px}
label{font-size:.78rem;color:#6a6a7e;display:block;margin-bottom:2px}
input,select,textarea{width:100%;background:#0a0a14;border:1px solid #1e1e30;color:#c8c8c8;padding:9px 11px;border-radius:5px;font-size:.88rem;font-family:inherit}
textarea{resize:vertical;min-height:100px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#b8943c}
.btn{background:#b8943c;color:#0b0b12;border:none;padding:10px 20px;border-radius:5px;font-size:.88rem;cursor:pointer;font-weight:bold;transition:.2s}
.btn:hover{background:#d4a94e}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn2{background:#1e1e30;color:#aaa}
.btn3{background:transparent;border:1px solid #2a2a3e;color:#777}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
#out{background:#0a0a14;border:1px solid #1e1e2e;border-radius:8px;padding:20px;min-height:200px;white-space:pre-wrap;line-height:2;font-size:.92rem;font-family:'PingFang SC','Noto Serif SC',Georgia,serif}
#out:empty::before{content:'小说正文将出现在这里...';color:#2a2a3e}
.loading{display:none;text-align:center;padding:20px;color:#b8943c}
.loading.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:28px;height:28px;border:2px solid #1e1e30;border-top-color:#b8943c;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
#score{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.score-item{background:#12121c;padding:8px 14px;border-radius:6px;border:1px solid #1e1e2e;text-align:center;min-width:70px}
.score-item .val{font-size:1.2rem;font-weight:bold}
.score-item .lbl{font-size:.7rem;color:#5a5a6e}
.val.good{color:#6bcb77}.val.ok{color:#e8c84a}.val.bad{color:#e85d5d}
.synopsis{background:#0a0a14;border:1px solid #1e1e30;border-radius:6px;padding:12px;margin-top:12px;font-size:.85rem;line-height:1.8;color:#888;display:none}
.synopsis.show{display:block}
.synopsis b{color:#b8943c}
#chapterNav{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;display:none}
#chapterNav.show{display:flex}
.chapter-btn{background:#1e1e30;color:#aaa;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:.8rem}
.chapter-btn.active{background:#b8943c;color:#0b0b12}
</style>
</head>
<body>
<div class="cont">
<h1>人味小说家</h1>
<p class="sub">规避 AI 检测 · 每一章都有真人笔触</p>

<div class="panel">
  <div class="row">
    <div class="col">
      <label>小说类型</label>
      <select id="genre">
        <option>玄幻</option><option>都市</option><option>科幻</option><option>悬疑</option>
        <option>言情</option><option>武侠</option><option>历史</option><option>恐怖</option>
        <option>轻小说</option><option>末日</option><option>无限流</option><option>仙侠</option>
      </select>
    </div>
    <div class="col">
      <label>叙事人称</label>
      <select id="pov">
        <option value="第一人称">第一人称 — "我"</option><option value="第三人称限知" selected>第三人称限知 — 主角视角</option>
        <option value="第三人称全知">第三人称全知 — 上帝视角</option>
        <option value="多视角切换">多视角切换</option>
      </select>
    </div>
    <div class="col">
      <label>文风笔触</label>
      <select id="style">
        <option value="老练">老练 — 克制留白，像传统文学</option><option value="网文" selected>网文 — 快节奏，爽点密集</option>
        <option value="文艺">文艺 — 细腻描写，重氛围</option><option value="冷峻">冷峻 — 简短有力，不废话</option>
        <option value="幽默">幽默 — 轻松调侃，有梗</option>
        <option value="暗黑">暗黑 — 阴沉压抑，重心理</option>
      </select>
    </div>
    <div class="col">
      <label>章节字数</label>
      <select id="length">
        <option value="1500">1500字</option><option value="2500" selected>2500字</option>
        <option value="4000">4000字</option><option value="6000">6000字</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div class="col3">
      <label>人物设定（主角名、性格、背景、能力等）</label>
      <textarea id="characters" placeholder="主角：林夜，25岁，退役特种兵，性格冷淡但重情义，有一个失踪的妹妹是他唯一的软肋&#10;女主：苏晚晴，22岁，医学院研究生，表面温柔内心倔强&#10;反派：......"></textarea>
    </div>
    <div class="col3">
      <label>世界观 / 剧情走向 / 本章大纲</label>
      <textarea id="outline" placeholder="世界观：近未来赛博朋克，人类可以通过芯片读取记忆&#10;本章：林夜接到一个匿名委托，要他潜入芯片公司总部窃取一份实验数据。行动中他发现这份数据记录的是他妹妹失踪前最后72小时的记忆......"></textarea>
    </div>
  </div>
  <div class="row">
    <div class="col">
      <label>前文接续（续写时用，新章节留空）</label>
      <textarea id="context" placeholder="留空 = 写新章节。续写时自动填入上一章内容..." rows="3"></textarea>
    </div>
  </div>
  <div class="actions">
    <button class="btn" id="go" onclick="writeNovel(false)">写这一章</button>
    <button class="btn" id="cont" onclick="writeNovel(true)">续写下一章</button>
    <button class="btn btn2" onclick="copyOut()">复制</button>
    <button class="btn btn2" onclick="downloadTxt()">下载 TXT</button>
    <button class="btn btn3" onclick="clearAll()">清空重来</button>
  </div>
</div>

<div class="loading" id="loading"><div class="spin"></div>正在写...</div>
<div id="chapterNav"></div>
<div class="synopsis" id="synopsis"></div>
<div id="score"></div>
<div id="out"></div>
</div>

<script>
const KEY='sk-77129c8e741b451c873d7eea6fa19d17';
const URL2='https://api.deepseek.com/v1/chat/completions';
let fullText='';
let chapters=[];
let currentChapter=0;

// 小说 AI 味禁用词
const NOVEL_AI_TELLS=[
  '总而言之','综上所述','首先其次最后','值得注意的是',
  '在漫长的岁月里','随着时间推移','深深意识到','产生深远影响',
  '他的眼中闪烁着','嘴角微微上扬','眼神中透露着',
  '不由得','不可否认','毫无疑问','显而易见',
  '内心涌起一股','一种难以言喻的','发自内心的',
  '突然之间','就在这时','与此同时','紧接着',
  '心中不由得','他的内心充满了','内心深处'
];

const STYLE_GUIDE={
  '老练':`像余华、莫言的笔法。白描为主，少用形容词。对话不加修饰。可以用重复营造节奏。故事推进靠细节不是靠叙述。`,
  '网文':`快节奏但不要套路。爽点要真实不注水。对话比描写多。段落短。金句要有但不要每句都是。`,
  '文艺':`像村上春树。细节丰富但不堆砌。善用通感和比喻。氛围大于情节。可以有闲笔。`,
  '冷峻':`像海明威。句子短。形容词少。对话就是对话不解释。用动作和对话推进一切。`,
  '幽默':`像王小波。机智但不油滑。讽刺但不下作。可以有理有据地跑题。`,
  '暗黑':`像爱伦坡。心理描写深入。氛围压抑。节奏慢但有张力。细节让人不安。`
};

const POV_GUIDE={
  '第一人称':`用"我"叙述。只写主角能感知到的。内心独白要真实，可以有偏见和错误判断。不要上帝视角解释剧情。`,
  '第三人称限知':`紧贴一个角色的视角。只写ta看到听到想到的。通过这个角色的滤镜看世界。不要跳出来解释。`,
  '第三人称全知':`全知但不能像说明书。偶尔插入角色的内心。叙述者可以有态度但不啰嗦。`,
  '多视角切换':`每个视角有明显风格差异。切换用空行分隔。不同角色注意到不同细节。`
};

async function writeNovel(cont){
  const characters=document.getElementById('characters').value.trim();
  const outline=document.getElementById('outline').value.trim();
  const genre=document.getElementById('genre').value;
  const pov=document.getElementById('pov').value;
  const style=document.getElementById('style').value;
  const length=parseInt(document.getElementById('length').value);
  const context=document.getElementById('context').value.trim();
  const out=document.getElementById('out');
  const loading=document.getElementById('loading');
  const btn=document.getElementById('go');
  const btnC=document.getElementById('cont');

  if(!outline&&!context){out.textContent='至少填一下剧情大纲';return}
  if(cont&&!fullText){out.textContent='先写一章再续写';return}
  if(cont&&!outline){out.textContent='续写也需要大纲指引方向';return}

  loading.classList.add('show');btn.disabled=true;btnC.disabled=true;

  const system=`你是一位写#${genre}#的职业作家。你写的每一章都要让人看不出是AI写的。

## 笔触要求
${STYLE_GUIDE[style]}

## 叙事要求
${POV_GUIDE[pov]}

## 铁律（违反一条就失败）
1. **禁用这些AI味表达**：${NOVEL_AI_TELLS.slice(0,6).join('、')}等。永远不要出现。
2. **句式随机**：长句30字，短句3字，交替。不要出现连续3句相似长度。
3. **对话>描写**：对话占本章40%以上。人物说话要有各自的口癖。
4. **不要完美主角**：主角有缺点、有犹豫、有犯浑的时候。
5. **具体不要抽象**：不说"他很愤怒"，要说"他把杯子摔在墙上，瓷片蹦到脚边"。
6. **段落不规矩**：有的段落6行，有的句子自成一段。
7. **允许闲笔**：可以有2-3句与主线无关的细节，像真人作家走神。
8. **结尾不要总结**：不要"他知道，这只是开始"、"命运的车轮开始转动"这类。
9. **开头直接进**：不要铺垫世界观。从动作或对话开始。
10. **不要每章升华**：这章讲什么就讲什么，不要拔高。

${characters?'## 人物设定\n'+characters:''}

${cont&&fullText?'## 前情提要\n'+fullText.slice(-1500):''}

输出要求：
- 本章约${length}字
- 直接输出正文，不要章节标题
- 不要任何前缀、后缀、说明
- 如果中途切换场景，用空行分隔`;

  try{
    const res=await fetch(URL2,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${KEY}`},
      body:JSON.stringify({
        model:'deepseek-chat',
        messages:[
          {role:'system',content:system},
          {role:'user',content:`请写本章。大纲：${outline}`}
        ],
        temperature:0.88+Math.random()*0.08,
        max_tokens:Math.min(length*3,8192),
        frequency_penalty:0.35,
        presence_penalty:0.45
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const text=data.choices[0].message.content;

    if(cont){fullText+='\n\n'+text}else{fullText=text}
    chapters.push(text);
    currentChapter=chapters.length-1;
    out.textContent=fullText;
    document.getElementById('context').value=fullText.slice(-2000);
    updateNav();
    analyzeNovel(text);
    if(!cont){genSynopsis(characters,outline,text)}
  }catch(e){
    out.textContent='生成失败: '+e.message;
  }finally{
    loading.classList.remove('show');btn.disabled=false;btnC.disabled=false;
  }
}

async function genSynopsis(characters,outline,text){
  const s=document.getElementById('synopsis');
  s.classList.add('show');
  s.innerHTML='<b>本章摘要：</b>正在生成...';
  try{
    const res=await fetch(URL2,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${KEY}`},
      body:JSON.stringify({
        model:'deepseek-chat',max_tokens:200,
        messages:[
          {role:'system',content:'用2-3句话概括这段小说的情节。直接输出，不要前缀。'},
          {role:'user',content:text.slice(0,800)}
        ]
      })
    });
    const data=await res.json();
    s.innerHTML='<b>本章摘要：</b>'+data.choices[0].message.content;
  }catch(e){s.innerHTML=''}
}

function analyzeNovel(text){
  let score=100;const issues=[];
  for(const w of NOVEL_AI_TELLS){if(text.includes(w)){score-=4;issues.push(w)}}
  const sentences=text.split(/[。！？.!?…]/).filter(s=>s.trim());
  const dlgLines=(text.match(/[""].*?[""]|''.*?''|「.*?」|『.*?』/g)||[]).length;
  const paras=text.split('\n\n').filter(p=>p.trim());
  if(dlgLines<sentences.length*0.2){score-=15;issues.push('对话比例偏低')}
  let consec=0;
  for(let i=1;i<sentences.length;i++){
    if(Math.abs(sentences[i].length-sentences[i-1].length)<3){consec++}else{consec=0}
    if(consec>=3){score-=10;issues.push('连续等长句式');break}
  }
  const cls=score>=80?'good':score>=50?'ok':'bad';
  document.getElementById('score').innerHTML=`
    <div class="score-item"><div class="val ${cls}">${Math.max(0,score)}</div><div class="lbl">人味指数</div></div>
    <div class="score-item"><div class="val">${sentences.length}</div><div class="lbl">句子数</div></div>
    <div class="score-item"><div class="val">${dlgLines}</div><div class="lbl">对话数</div></div>
    <div class="score-item"><div class="val">${paras.length}</div><div class="lbl">段落数</div></div>
    ${issues.length?`<div class="score-item"><div class="val bad">${issues.length}</div><div class="lbl">AI痕迹</div></div>`:''}
  `;
}

function updateNav(){
  const nav=document.getElementById('chapterNav');
  if(chapters.length<=1){nav.classList.remove('show');return}
  nav.classList.add('show');
  nav.innerHTML=chapters.map((_,i)=>`<button class="chapter-btn${i===currentChapter?' active':''}" onclick="switchChapter(${i})">第${i+1}章</button>`).join('');
}

function switchChapter(i){
  currentChapter=i;
  document.getElementById('out').textContent=fullText=chapters.slice(0,i+1).join('\n\n');
  document.getElementById('context').value=fullText.slice(-2000);
  updateNav();
}

function copyOut(){if(fullText){navigator.clipboard.writeText(fullText);alert('已复制')}}
function downloadTxt(){if(!fullText)return;const b=new Blob([fullText],{type:'text/plain;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='小说_'+new Date().toISOString().slice(0,10)+'.txt';a.click()}
function clearAll(){fullText='';chapters=[];currentChapter=0;document.getElementById('out').textContent='';document.getElementById('context').value='';document.getElementById('synopsis').classList.remove('show');document.getElementById('score').innerHTML='';document.getElementById('chapterNav').classList.remove('show')}
</script>
</body>
</html>
