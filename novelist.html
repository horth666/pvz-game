<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>小说家智能体</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;font-family:'Segoe UI','PingFang SC',sans-serif;color:#e0e0e0}
.cont{max-width:900px;margin:0 auto;padding:20px}
h1{text-align:center;padding:24px 0 8px;font-size:2rem;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#888;margin-bottom:24px;font-size:.9rem}
.panel{background:rgba(255,255,255,.05);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid rgba(255,255,255,.08)}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.row:last-child{margin-bottom:0}
label{font-size:.85rem;color:#aaa;display:block;margin-bottom:4px}
input,select,textarea{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.12);color:#fff;padding:10px 14px;border-radius:8px;font-size:.9rem;width:100%;font-family:inherit}
textarea{resize:vertical;min-height:100px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#f7971e}
.col{flex:1;min-width:150px}
.col2{flex:2;min-width:200px}
.btn{background:linear-gradient(135deg,#f7971e,#e65100);color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:bold;transition:all.2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(247,151,30,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn2{background:rgba(255,255,255,.1);color:#fff}
#output{background:rgba(255,255,255,.03);border-radius:12px;padding:24px;min-height:200px;white-space:pre-wrap;line-height:1.9;font-size:.95rem;border:1px solid rgba(255,255,255,.06)}
#output:empty::before{content:'你的小说将在这里生成...';color:#555}
.loading{display:none;text-align:center;padding:30px;color:#f7971e}
.loading.show{display:block}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#f7971e;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
#stats{color:#888;font-size:.8rem;margin-top:8px}
.chapter-list{margin-top:12px}
.chapter-item{background:rgba(255,255,255,.03);padding:10px 16px;border-radius:8px;margin-bottom:6px;cursor:pointer;border-left:3px solid #f7971e;transition:.2s}
.chapter-item:hover{background:rgba(255,255,255,.08)}
.chapter-item .cnum{color:#f7971e;font-weight:bold;margin-right:8px}
.msg{color:#4caf50;font-size:.85rem;margin-top:8px;display:none}
.msg.show{display:block}
</style>
</head>
<body>
<div class="cont">
<h1>小说家智能体</h1>
<p class="sub">AI 写作助手 — 长篇 / 短篇 / 章节续写 / 灵感创作</p>

<div class="panel">
  <div class="row">
    <div class="col">
      <label>小说类型</label>
      <select id="genre">
        <option value="玄幻">玄幻</option><option value="都市">都市</option><option value="科幻">科幻</option>
        <option value="悬疑">悬疑</option><option value="言情">言情</option><option value="武侠">武侠</option>
        <option value="历史">历史</option><option value="恐怖">恐怖</option>
        <option value="轻小说">轻小说</option><option value="同人">同人</option>
      </select>
    </div>
    <div class="col">
      <label>写作风格</label>
      <select id="style">
        <option value="细腻描写">细腻描写</option><option value="快节奏">快节奏</option><option value="幽默风趣">幽默风趣</option>
        <option value="严肃深沉">严肃深沉</option><option value="诗意唯美">诗意唯美</option><option value="热血战斗">热血战斗</option>
      </select>
    </div>
    <div class="col">
      <label>篇幅</label>
      <select id="length">
        <option value="800">短篇 (~800字)</option><option value="2000" selected>中篇 (~2000字)</option>
        <option value="4000">长篇 (~4000字)</option><option value="6000">大长篇 (~6000字)</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div class="col" style="flex:3">
      <label>创作要求（标题、主角、世界观、情节走向等）</label>
      <textarea id="prompt" placeholder="例如：写一个穿越到修真世界的程序员，用代码思维破解修仙功法，轻松幽默风格，主角叫林凡，开头从他加班到深夜突然被雷劈穿越开始..."></textarea>
    </div>
  </div>
  <div class="row">
    <div class="col" style="flex:1">
      <label>续写上文（可选，用于连续写作）</label>
      <textarea id="context" placeholder="如果不填则全新创作。如需续写，请粘贴前文内容..."></textarea>
    </div>
  </div>
  <div class="actions">
    <button class="btn" id="generate" onclick="generate()">开始创作</button>
    <button class="btn btn2" id="continue" onclick="generate(true)">续写下一章</button>
    <button class="btn btn2" onclick="copyText()">复制全文</button>
    <button class="btn btn2" onclick="downloadTxt()">下载 TXT</button>
    <button class="btn btn2" onclick="clearAll()">清空重来</button>
  </div>
  <div id="stats"></div>
  <div class="msg" id="msg"></div>
</div>

<div class="loading" id="loading"><div class="spinner"></div>AI 正在创作中...</div>
<div id="output"></div>
</div>

<script>
const API_KEY='sk-77129c8e741b451c873d7eea6fa19d17';
const API_URL='https://api.deepseek.com/v1/chat/completions';
let fullText='';

async function generate(cont=false){
  const prompt=document.getElementById('prompt').value.trim();
  const context=document.getElementById('context').value.trim();
  const genre=document.getElementById('genre').value;
  const style=document.getElementById('style').value;
  const length=parseInt(document.getElementById('length').value);
  const output=document.getElementById('output');
  const loading=document.getElementById('loading');
  const btn=document.getElementById('generate');
  const btnC=document.getElementById('continue');
  const msg=document.getElementById('msg');
  const stats=document.getElementById('stats');

  if(!prompt&&!cont){msg.textContent='请填写创作要求';msg.classList.add('show');return}
  if(cont&&!fullText){msg.textContent='请先生成一段内容再续写';msg.classList.add('show');return}

  msg.classList.remove('show');
  loading.classList.add('show');
  btn.disabled=true;btnC.disabled=true;

  let system,user;
  if(cont){
    system='你是一位专业小说家。请在已有故事基础上续写下一章。保持一致的风格、人物和世界观。输出纯正文，不需要标题和章节号。';
    user=`已有故事：\n\n${fullText.slice(-2000)}\n\n请续写约${length}字。体裁：${genre}，风格：${style}。`;
  }else{
    system=`你是一位专业小说家，擅长创作${genre}类小说，写作风格${style}。请根据用户的要求创作小说。要求：
1. 直接输出正文，不需要标题、章节名、前缀说明
2. 字数约${length}字
3. 文笔流畅，情节吸引人，对话生动
4. 适当分段，每段不宜过长`;
    user=prompt;
  }

  try{
    const res=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${API_KEY}`},
      body:JSON.stringify({
        model:'deepseek-chat',
        messages:[{role:'system',content:system},{role:'user',content:user}],
        temperature:0.85,max_tokens:Math.min(length*3,8192),
        top_p:0.95
      })
    });
    const data=await res.json();
    if(data.error){throw new Error(data.error.message||'API错误')}
    const text=data.choices[0].message.content;

    if(cont){fullText+='\n\n'+text}else{fullText=text}
    output.textContent=fullText;
    stats.textContent=`字数: ${fullText.length} | 生成时间: ${new Date().toLocaleTimeString()}`;

    document.getElementById('context').value=fullText.slice(-3000);
  }catch(e){
    output.textContent='生成失败: '+e.message;
  }finally{
    loading.classList.remove('show');
    btn.disabled=false;btnC.disabled=false;
  }
}

function copyText(){
  if(!fullText)return;
  navigator.clipboard.writeText(fullText).then(()=>{
    const m=document.getElementById('msg');m.textContent='已复制到剪贴板';m.classList.add('show');
    setTimeout(()=>m.classList.remove('show'),2000);
  });
}

function downloadTxt(){
  if(!fullText)return;
  const blob=new Blob([fullText],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`小说_${new Date().toISOString().slice(0,10)}.txt`;a.click();
}

function clearAll(){
  fullText='';document.getElementById('output').textContent='';
  document.getElementById('context').value='';document.getElementById('stats').textContent='';
}
</script>
</body>
</html>
