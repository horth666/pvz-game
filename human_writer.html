<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>真人笔触 — AI 拟人化写作</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#ccc;font-family:'PingFang SC','Segoe UI',sans-serif;min-height:100vh}
.cont{max-width:960px;margin:0 auto;padding:20px}
h1{text-align:center;padding:20px 0 4px;font-size:1.6rem;color:#fff}
h1 span{background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{text-align:center;color:#666;font-size:.85rem;margin-bottom:20px}
.panel{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:18px;margin-bottom:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.row:last-child{margin-bottom:0}
.col{flex:1;min-width:140px}
.col2{flex:2;min-width:200px}
label{font-size:.8rem;color:#888;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:1px}
input,select,textarea{width:100%;background:#111;border:1px solid #333;color:#ddd;padding:10px 12px;border-radius:6px;font-size:.9rem;font-family:inherit}
textarea{resize:vertical;min-height:120px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#ff6b6b}
.btn{background:#ff6b6b;color:#fff;border:none;padding:11px 22px;border-radius:6px;font-size:.9rem;cursor:pointer;font-weight:bold;transition:.2s}
.btn:hover{background:#ee5a5a}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn2{background:#333;color:#ccc}
.btn3{background:transparent;border:1px solid #444;color:#aaa}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
#out{background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:20px;min-height:150px;white-space:pre-wrap;line-height:2;font-size:.95rem}
#out:empty::before{content:'处理后的人味文本将出现在这里...';color:#444}
.loading{display:none;text-align:center;padding:20px;color:#ff6b6b}
.loading.show{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:30px;height:30px;border:2px solid #333;border-top-color:#ff6b6b;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
#score{display:flex;gap:20px;flex-wrap:wrap;margin-top:12px}
.score-item{background:#1a1a1a;padding:10px 16px;border-radius:8px;border:1px solid #2a2a2a;text-align:center;min-width:80px}
.score-item .val{font-size:1.3rem;font-weight:bold}
.score-item .lbl{font-size:.7rem;color:#888}
.val.good{color:#6bcb77}.val.ok{color:#ffd93d}.val.bad{color:#ff6b6b}
.tips{font-size:.8rem;color:#666;margin-top:10px;line-height:1.8}
.tips b{color:#ffd93d}
</style>
</head>
<body>
<div class="cont">
<h1><span>真人笔触</span></h1>
<p class="sub">让 AI 写出人味 — 规避检测 · 杜绝粗制滥造</p>

<div class="panel">
  <div class="row">
    <div class="col">
      <label>写作场景</label>
      <select id="scene">
        <option value="自媒体">自媒体 / 公众号</option><option value="小红书">小红书</option>
        <option value="知乎">知乎回答</option><option value="小说">小说 / 故事</option>
        <option value="论文">学术论文</option><option value="邮件">商务邮件</option>
        <option value="评论">商品评论</option><option value="朋友圈">朋友圈文案</option>
      </select>
    </div>
    <div class="col">
      <label>人设 / 语气</label>
      <select id="persona">
        <option value="锐评博主">锐评博主 — 毒舌犀利</option><option value="知心姐姐">知心姐姐 — 温暖治愈</option>
        <option value="老炮儿">老炮儿 — 江湖气重</option><option value="理工男">理工男 — 理性克制</option>
        <option value="文艺青年">文艺青年 — 感性细腻</option><option value="打工人">打工人 — 真实接地气</option>
        <option value="专家">专家 — 权威严谨</option><option value="学生党">学生党 — 青春活泼</option>
      </select>
    </div>
    <div class="col">
      <label>改写强度</label>
      <select id="strength">
        <option value="light">轻度 — 保留结构，去 AI 味</option><option value="medium" selected>中度 — 重写句式，加个人风格</option>
        <option value="heavy">重度 — 完全重塑，像真人写的</option>
      </select>
    </div>
  </div>
  <div class="row">
    <div class="col">
      <label>粘贴 AI 生成的文本（或要求全新创作的主题）</label>
      <textarea id="input" placeholder="两种用法：&#10;1. 粘贴你从 ChatGPT/Claude 拿到的文本，帮你改成人话&#10;2. 直接写一个主题，从零创作"></textarea>
    </div>
  </div>
  <div class="row">
    <div class="col">
      <label>额外约束（可选）</label>
      <input id="extra" placeholder="例如：不要用"首先其次最后"，每段不超过3行，加点脏话，口语化...">
    </div>
  </div>
  <div class="actions">
    <button class="btn" id="go" onclick="process()">开始改写 / 创作</button>
    <button class="btn btn2" onclick="copyOut()">复制结果</button>
    <button class="btn btn3" onclick="clearAll()">清空</button>
  </div>
  <div class="tips">
    <b>核心策略：</b>打破固定结构 | 句式长短交替 | 禁用 AI 常用词 | 注入人设语气 | 偶尔跑题 | 允许不完美
  </div>
</div>

<div class="loading" id="loading"><div class="spin"></div>正在注入人味...</div>
<div id="score"></div>
<div id="out"></div>
</div>

<script>
const KEY='sk-77129c8e741b451c873d7eea6fa19d17';
const URL2='https://api.deepseek.com/v1/chat/completions';
let result='';

// AI 常见违规词库
const AI_TELLS=[
  '总而言之','综上所述','首先其次最后','值得注意的是','不可否认',
  '在当今社会','随着...的发展','不仅如此','更重要的是','此外',
  '毫无疑问','显而易见','众所周知','毋庸置疑','从某种程度上说',
  '然而','因此','所以','不过','另外','同时','此外','而且',
  '深深意识到','产生深远影响','引起广泛关注','具有重要意义'
];

const SCENE_RULES={
  '自媒体':`必须像真人博主写的东西。要求：
- 开头不要铺垫，直接切入，像在跟朋友聊天
- 句式长短交错，短则3-5字，长则20-30字
- 允许口语、网络用语、甚至脏话
- 段落不超过4行，用空行呼吸
- 结尾收得干脆，不要总结升华`,
  '小红书':`模仿小红书博主的口吻：
- 善用emoji但不是每句都加
- 短句为主，大量换行
- 像在跟闺蜜分享，语气亲密
- 可以加个人体验和情感表达
- 避免"姐妹们"开头（太AI了）
- 结构松弛，想到哪说到哪`,
  '知乎':`知乎高赞回答风格：
- 开头用金句或反常识观点抓人
- 有理有据但不掉书袋
- 允许第一人称经历
- 偶尔自嘲或幽默
- 结尾留白，不要强行总结
- 专业但不装`,
  '小说':`小说创作要求：
- 多写对话，少写大段描写
- 人物要有缺点，不要完美
- 情节可以有闲笔，不要每句都为推进剧情
- 用具体的细节代替抽象形容
- 偶尔打破第四面墙也行`,
  '论文':`学术写作但去掉AI味：
- 不要每段"首先其次最后"套娃
- 引用要有具体数据或人名
- 允许学术圈的吐槽和行话
- 避免"本研究具有重要理论意义"这种废话`,
  '邮件':`商务邮件但像人写的：
- 不要模板化的寒暄
- 直说正事，但要有人情味
- 可以有个性化的结尾
- 避免"Best regards"这种机器人标配`,
  '评论':`商品评论：
- 像真实用户写的，有好有坏
- 带具体使用场景和细节
- 可以有语法错误和错别字（故意的）
- 不要完美的分点式评价`,
  '朋友圈':`朋友圈文案：
- 像随手发的，不要太精致
- 可以莫名其妙、情绪化
- 短，不超过100字
- 配emoji但要克制`
};

const PERSONA_RULES={
  '锐评博主':'用毒舌犀利的语气，不怕得罪人。句式短促有力。允许阴阳怪气。',
  '知心姐姐':'温暖治愈但不矫情。用平实的语言，像过来人分享经验。偶尔有生活化的比喻。',
  '老炮儿':'江湖气重，市井味浓。能用俗语不用成语。语气豪爽直接，不拐弯抹角。',
  '理工男':'理性克制，用数据和逻辑说话。但可以有冷幽默。描述精确但不枯燥。',
  '文艺青年':'感性细腻，善用通感和意象。但不矫揉造作，要真诚。偶尔引用冷门诗句。',
  '打工人':'真实接地气。用打工人的视角看世界。可以有抱怨有无奈但不丧。',
  '专家':'权威但不端着。能用通俗语言解释复杂问题。偶尔自我调侃。',
  '学生党':'青春活泼，网感好。善用梗和缩写。语气轻松随意，像在学校群里聊天。'
};

async function process(){
  const input=document.getElementById('input').value.trim();
  const scene=document.getElementById('scene').value;
  const persona=document.getElementById('persona').value;
  const strength=document.getElementById('strength').value;
  const extra=document.getElementById('extra').value.trim();
  const out=document.getElementById('out');
  const loading=document.getElementById('loading');
  const btn=document.getElementById('go');

  if(!input){out.textContent='请粘贴文本或输入主题';return}

  loading.classList.add('show');btn.disabled=true;out.textContent='';

  const isRewrite=input.length>100&&!input.includes('写一个')&&!input.includes('帮我')&&!input.includes('写篇');

  const system=`你是一位"反AI检测"写作专家。你的任务是把文本改写/创作为完全像真人写的内容。

## 场景规则
${SCENE_RULES[scene]}

## 人设规则
${PERSONA_RULES[persona]}

## 核心技巧（必须遵守）
1. **打破句式规律**：长短句随机交替，不要出现连续3句以上相同长度
2. **禁用AI惯用词**：绝对不能使用：${AI_TELLS.slice(0,8).join('、')}等
3. **允许不完美**：可以有一个不完整的句子、一个口语化的重复、一个跑题的插曲
4. **注入语气词**：适当加入"说实话""讲真""你懂的""就很离谱"等口语标记
5. **个性化开头**：不要从背景介绍开始。可以用一个反问、一个故事、一个吐槽开头
6. **自然的段落**：段落长度随机，有的一句话一段，有的五六行一段
7. **具体代替抽象**：不要"具有重要影响"，要说"直接让隔壁部门卷起来了"
8. **偶尔偏题**：在长篇中可以有一个离题2-3句的闲笔，像真人在聊天时走神

## 改写强度：${strength==='light'?'轻度，保留原结构':strength==='medium'?'中度，重写句式结构':'重度，完全重塑为真人风格'}
${extra?'## 额外要求：'+extra:''}

${isRewrite?'请改写以下文本，输出改写后的完整内容，不需要任何前缀说明。':'请根据以下主题直接创作，不需任何前缀说明。'}`;

  try{
    const res=await fetch(URL2,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${KEY}`},
      body:JSON.stringify({
        model:'deepseek-chat',
        messages:[{role:'system',content:system},{role:'user',content:input}],
        temperature:0.9+Math.random()*0.1,
        max_tokens:isRewrite?Math.min(input.length*2,8192):4096,
        top_p:0.92+Math.random()*0.08,
        frequency_penalty:0.3,presence_penalty:0.4
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    result=data.choices[0].message.content;
    out.textContent=result;
    analyzeAI(result);
  }catch(e){
    out.textContent='失败: '+e.message;
  }finally{
    loading.classList.remove('show');btn.disabled=false;
  }
}

function analyzeAI(text){
  let score=100;const issues=[];
  for(const word of AI_TELLS){
    if(text.includes(word)){score-=5;issues.push(word)}
  }
  // 检查句式重复
  const sentences=text.split(/[。！？.!?]/).filter(s=>s.trim());
  const lens=sentences.map(s=>s.length);
  const avg=Math.floor(lens.reduce((a,b)=>a+b,0)/lens.length);
  let consecutive=0;
  for(let i=1;i<lens.length;i++){
    if(Math.abs(lens[i]-lens[i-1])<3){consecutive++}else{consecutive=0}
    if(consecutive>=3){score-=10;issues.push('连续等长句式');break}
  }
  // 段落检查
  const paras=text.split('\n\n').filter(p=>p.trim());
  if(paras.every(p=>p.length>200)){score-=8;issues.push('段落过长统一')}

  const cls=score>=80?'good':score>=50?'ok':'bad';
  document.getElementById('score').innerHTML=`
    <div class="score-item"><div class="val ${cls}">${Math.max(0,score)}</div><div class="lbl">人味指数</div></div>
    <div class="score-item"><div class="val">${sentences.length}</div><div class="lbl">句子数</div></div>
    <div class="score-item"><div class="val">${paras.length}</div><div class="lbl">段落数</div></div>
    <div class="score-item"><div class="val">${avg}</div><div class="lbl">平均句长</div></div>
    ${issues.length?`<div class="score-item"><div class="val bad">${issues.length}</div><div class="lbl">AI痕迹</div></div>`:''}
  `;
}

function copyOut(){if(result){navigator.clipboard.writeText(result);alert('已复制')}}
function clearAll(){result='';document.getElementById('out').textContent='';document.getElementById('input').value='';document.getElementById('score').innerHTML=''}
</script>
</body>
</html>
