<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>闪避大师</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;touch-action:none;overflow:hidden;user-select:none;-webkit-user-select:none;height:100vh;display:flex;justify-content:center;align-items:center}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;
function rs(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
rs();window.onresize=rs;

let player={x:W/2,y:H*0.78,r:W*0.04},obstacles=[],particles=[],stars=[];
let score=0,timer=0,gameOver=false,highScore=+localStorage.getItem('dodgeHS')||0;
let touchX=null,targetX=player.x;

// 星空背景
for(let i=0;i<60;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+0.3,v:Math.random()*0.3+0.1});

// ===== 触控 & 鼠标 =====
c.addEventListener('touchstart',e=>{e.preventDefault();touchX=e.touches[0].clientX});
c.addEventListener('touchmove',e=>{e.preventDefault();touchX=e.touches[0].clientX});
c.addEventListener('touchend',()=>touchX=null);
c.addEventListener('mousemove',e=>{if(e.buttons)targetX=e.clientX});
c.addEventListener('mousedown',e=>targetX=e.clientX);
c.addEventListener('click',()=>{if(gameOver)restart()});

// ===== 障碍物 =====
function spawnObstacle(){
  const types=[
    {color:'#f55',score:1,r:W*0.028,emoji:'💥'},
    {color:'#f80',score:2,r:W*0.022,emoji:'🔥'},
    {color:'#f0f',score:3,r:W*0.035,emoji:'💀'},
  ];
  const t=types[Math.floor(Math.random()*types.length)];
  obstacles.push({x:Math.random()*(W-60)+30,y:-40,r:t.r,color:t.color,score:t.score,emoji:t.emoji,
    speed:1.5+Math.random()*(1+timer/600),wobble:Math.random()*Math.PI*2});
}

// ===== 粒子 =====
function pop(x,y,color,n=6){
  for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:20+Math.random()*15,color,s:Math.random()*3+1});
}

// ===== 更新 =====
function update(){
  if(gameOver)return;
  timer++;

  // 移动
  if(touchX!==null)targetX=touchX;
  player.x+=(targetX-player.x)*0.15;
  player.x=Math.max(player.r,Math.min(W-player.r,player.x));

  // 生成
  const rate=Math.max(18,60-timer/150);
  if(timer%rate===0)spawnObstacle();

  // 更新障碍物
  obstacles.forEach(o=>{o.y+=o.speed;o.x+=Math.sin(o.wobble+timer*0.03)*0.6});
  // 碰撞
  for(let o of obstacles){
    const d=Math.hypot(player.x-o.x,player.y-o.y);
    if(d<player.r+o.r-4){o.dead=true;pop(o.x,o.y,o.color,15);end();return}
  }
  // 越过分
  for(let o of obstacles){
    if(!o.scored&&o.y>player.y+player.r){o.scored=true;score+=o.score;pop(o.x,H-20,'#ff0',4)}
  }
  obstacles=obstacles.filter(o=>!o.dead&&o.y<H+60);
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0});
  stars.forEach(s=>{s.y+=s.v;if(s.y>H){s.y=0;s.x=Math.random()*W}})
}

function end(){
  gameOver=true;
  if(score>highScore){highScore=score;localStorage.setItem('dodgeHS',highScore)}
}

function restart(){player.x=W/2;targetX=W/2;touchX=null;obstacles=[];particles=[];score=0;timer=0;gameOver=false}

// ===== 渲染 =====
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);

  // 星
  stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${s.s/2})`;ctx.fillRect(s.x,s.y,s.s,s.s)});

  // 障碍
  obstacles.forEach(o=>{
    ctx.fillStyle=o.color+'33';ctx.beginPath();ctx.arc(o.x,o.y,o.r+4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=o.color;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();
    ctx.font=`${o.r*1.2}px serif`;ctx.textAlign='center';ctx.fillText(o.emoji,o.x,o.y+o.r*0.3);
  });

  // 粒子
  particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life/35;ctx.fillRect(p.x-1,p.y-1,p.s,p.s)});
  ctx.globalAlpha=1;

  // 玩家
  const glow=1+Math.sin(timer*0.08)*0.2;
  ctx.fillStyle='#0cf';ctx.shadowColor='#0cf';ctx.shadowBlur=18*glow;
  ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(player.x-2,player.y-3,player.r*0.3,0,Math.PI*2);ctx.fill();

  // 得分
  ctx.fillStyle='#fff';ctx.font=`bold ${W*0.06}px "Segoe UI"`;ctx.textAlign='center';
  ctx.fillText(score,player.x,H*0.12);

  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff0';ctx.font=`bold ${W*0.08}px "Segoe UI"`;
    ctx.fillText('游戏结束',W/2,H*0.38);
    ctx.fillStyle='#fff';ctx.font=`${W*0.045}px "Segoe UI"`;
    ctx.fillText(`得分: ${score}`,W/2,H*0.48);
    ctx.fillText(`最高: ${highScore}`,W/2,H*0.55);
    ctx.fillStyle='#aaa';ctx.font=`${W*0.035}px "Segoe UI"`;
    ctx.fillText('点击屏幕重新开始',W/2,H*0.65);
  }
}

function loop(){update();draw();requestAnimationFrame(loop)}
loop();
</script>
</body>
</html>
