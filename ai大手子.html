<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植物大战僵尸 - 简易版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',sans-serif}
#wrap{text-align:center}
h1{color:#ffd700;margin-bottom:8px;font-size:1.6rem;text-shadow:2px 2px 0 #333}
#bar{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:8px}
#bar span{color:#fff;font-size:1.1rem;background:rgba(255,255,255,.1);padding:6px 16px;border-radius:14px}
#sun{color:#ffd700}
canvas{border:3px solid #4a2a0a;border-radius:8px;cursor:crosshair;background:#5a9e3e;display:block;margin:0 auto}
#tools{display:flex;justify-content:center;gap:10px;margin-top:8px}
.card{padding:8px 16px;border-radius:10px;border:2px solid #6b4226;background:#f5deb3;cursor:pointer;font-size:.9rem;transition:all .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.card.sel{border-color:#ffd700;box-shadow:0 0 12px #ffd700}
.card .cost{color:#e67e22;font-weight:bold}
#msg{color:#ff6b6b;font-size:1.4rem;margin-top:8px;min-height:30px}
</style>
</head>
<body>
<div id="wrap">
<h1>🌻 植物大战僵尸 🌻</h1>
<div id="bar">
  <span>☀️ <b id="sun">150</b></span>
  <span>🧟 波次 <b id="wave">1</b></span>
  <span>⭐ <b id="score">0</b></span>
</div>
<canvas id="c" width="800" height="450"></canvas>
<div id="tools">
  <div class="card sel" data-plant="pea"  >🟢 豌豆射手 <span class="cost">100</span></div>
  <div class="card"      data-plant="sun"  >🌻 向日葵   <span class="cost">50</span></div>
  <div class="card"      data-plant="nut"  >🛡️ 坚果墙   <span class="cost">50</span></div>
  <div class="card"      data-plant="shovel">🔧 铲除</div>
</div>
<div id="msg"></div>
</div>

<script>
// ===== 初始化 =====
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
const W=800,H=450,ROWS=5,COLS=9,CELL_W=70,CELL_H=70,OFFX=50,OFFY=50;

let sun=150,score=0,wave=1,selected='pea',plants=[],zombies=[],peas=[],suns=[],particles=[];
let frame=0,gameOver=false,zombieTimer=0,gameSpeed=1;

// ===== 植物数据 =====
const PD={
  pea:  {name:'豌豆射手',cost:100,hp:100,color:'#4caf50',emoji:'🟢',shoot:60,damage:25},
  sun:  {name:'向日葵',  cost:50, hp:80, color:'#ffd700',emoji:'🌻',sunCD:120,sunAmt:25},
  nut:  {name:'坚果墙',  cost:50, hp:400,color:'#c49a3c',emoji:'🛡️'},
};

// ===== 工具选择 =====
document.querySelectorAll('.card').forEach(c=>{
  c.onclick=()=>{
    document.querySelectorAll('.card').forEach(x=>x.classList.remove('sel'));
    c.classList.add('sel');
    selected=c.dataset.plant;
  };
});

// ===== Canvas 点击 =====
canvas.onclick=e=>{
  if(gameOver)return;
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const col=Math.floor((mx-OFFX)/CELL_W), row=Math.floor((my-OFFY)/CELL_H);
  if(col<0||col>=COLS||row<0||row>=ROWS)return;

  // 检查是否有植物在此格
  const existing=plants.find(p=>p.col===col&&p.row===row);

  if(selected==='shovel'){
    if(existing){existing.hp=0;spawnParticles(col,row,'#8b4513',8)}}
    return;
  }

  if(existing)return;

  const pd=PD[selected];
  if(!pd||sun<pd.cost)return;

  sun-=pd.cost;
  updateUI();
  plants.push({type:selected,col,row,hp:pd.hp,timer:0});
  spawnParticles(col,row,pd.color,6);
};

// ===== 放置植物 =====
function placePlant(type,col,row){
  const pd=PD[type];
  sun-=pd.cost;
  plants.push({type,col,row,hp:pd.hp,timer:0});
  updateUI();
}

// ===== 游戏循环 =====
function update(){
  if(gameOver)return;
  frame++;

  // 生成阳光
  if(frame%90===0){
    suns.push({x:100+Math.random()*(W-200),y:-20,speed:1+Math.random()*1.5});
  }

  // 生成僵尸
  zombieTimer++;
  const zRate=Math.max(60,300-wave*20);
  if(zombieTimer>=zRate){
    zombieTimer=0;
    const row=Math.floor(Math.random()*ROWS);
    const hp=100+wave*30;
    zombies.push({row,x:W+20,y:OFFY+row*CELL_H+15,hp,speed:0.3+wave*0.05, eating:null,eatTimer:0});
  }

  // 更新阳光掉落
  suns.forEach(s=>{s.y+=s.speed;});
  // 更新植物
  plants.forEach(p=>{
    p.timer++;
    const pd=PD[p.type];
    // 豌豆射手射击
    if(p.type==='pea'&&p.timer%pd.shoot===0){
      // 检查本行是否有僵尸
      const hasZ=zombies.some(z=>z.row===p.row&&z.x>OFFX+p.col*CELL_W);
      if(hasZ){
        peas.push({x:OFFX+p.col*CELL_W+CELL_W-10,y:OFFY+p.row*CELL_H+25,speed:4,damage:pd.damage,row:p.row});
        p.timer=0;
      }
    }
    // 向日葵产阳光
    if(p.type==='sun'&&p.timer>=pd.sunCD){
      p.timer=0;
      sun+=pd.sunAmt;
      suns.push({x:OFFX+p.col*CELL_W+CELL_W/2,y:OFFY+p.row*CELL_H-10,speed:0.5,fromPlant:true});
      updateUI();
    }
  });

  // 更新豌豆
  peas.forEach(pe=>{
    pe.x+=pe.speed;
    // 碰撞检测
    for(let z of zombies){
      if(z.row===pe.row&&Math.abs(z.x-pe.x)<25&&Math.abs(z.y-pe.y)<25){
        z.hp-=pe.damage;
        pe.dead=true;
        spawnParticles(0,0,'#76ff03',3,pe.x,pe.y);
        break;
      }
    }
  });

  // 更新僵尸
  zombies.forEach(z=>{
    // 检查前方是否有植物
    z.eating=null;
    for(let p of plants){
      if(p.row===z.row&&Math.abs((OFFX+p.col*CELL_W+CELL_W/2)-z.x)<CELL_W/2&&p.hp>0){
        z.eating=p;
        break;
      }
    }
    if(z.eating){
      z.eatTimer++;
      if(z.eatTimer%40===0)z.eating.hp-=20;
    }else{
      z.x-=z.speed*gameSpeed;
    }
  });

  // 碰撞：僵尸到达植物位置
  // (handled in zombie update above)

  // 清理
  peas=peas.filter(p=>!p.dead&&p.x<W+50);
  suns=suns.filter(s=>s.y<H+50);
  zombies=zombies.filter(z=>z.hp>0);
  plants=plants.filter(p=>p.hp>0);

  // 收集阳光（自动点击范围）
  for(let s of suns){
    if(s.y>H-20){s.collected=true;}
  }
  const collected=suns.filter(s=>s.collected).length;
  sun+=collected*25;
  suns=suns.filter(s=>!s.collected);
  if(collected)updateUI();

  // 僵尸到达左边 → 游戏结束
  for(let z of zombies){
    if(z.x<OFFX-20){endGame();return;}
  }

  // 击杀加分
  const deadZ=zombies.filter(z=>z.hp<=0).length;
  if(deadZ){score+=deadZ*100;updateUI();}

  // 波次推进
  if(frame%1800===0){wave++;updateUI();gameSpeed+=0.05;}
}

function spawnParticles(col,row,color,count,cx,cy){
  const x=cx||OFFX+col*CELL_W+CELL_W/2;
  const y=cy||OFFY+row*CELL_H+CELL_H/2;
  for(let i=0;i<count;i++){
    particles.push({
      x,y,color,
      vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,
      life:20+Math.random()*20
    });
  }
}

// ===== 渲染 =====
function draw(){
  ctx.clearRect(0,0,W,H);

  // 背景草地
  ctx.fillStyle='#5a9e3e';ctx.fillRect(0,0,W,H);

  // 网格
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x=OFFX+c*CELL_W, y=OFFY+r*CELL_H;
      ctx.strokeStyle='rgba(0,0,0,.12)';
      ctx.strokeRect(x,y,CELL_W,CELL_H);
      // 草地质感
      ctx.fillStyle='rgba(0,0,0,.04)';
      if((r+c)%2===0)ctx.fillRect(x,y,CELL_W,CELL_H);
    }
  }

  // 植物
  plants.forEach(p=>{
    const x=OFFX+p.col*CELL_W+CELL_W/2, y=OFFY+p.row*CELL_H+CELL_H/2;
    const pd=PD[p.type];
    // 底座
    ctx.fillStyle=pd.color+'66';ctx.beginPath();
    ctx.arc(x,y-5,22,0,Math.PI*2);ctx.fill();
    // 主体
    ctx.fillStyle=pd.color;ctx.beginPath();
    const scale=p.hp/PD[p.type].hp;
    ctx.arc(x,y-5,18*scale,0,Math.PI*2);ctx.fill();
    // emoji
    ctx.font='24px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pd.emoji,x,y-5);
    // 血条
    if(p.hp<PD[p.type].hp){
      ctx.fillStyle='#333';ctx.fillRect(x-15,y-30,30,4);
      ctx.fillStyle='#f44';ctx.fillRect(x-15,y-30,30*scale,4);
    }
  });

  // 僵尸
  zombies.forEach(z=>{
    ctx.fillStyle='#666';ctx.beginPath();
    ctx.arc(z.x,z.y,18,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#555';ctx.beginPath();
    ctx.arc(z.x,z.y,15,0,Math.PI*2);ctx.fill();
    ctx.font='22px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🧟',z.x,z.y);
    // 血条
    const maxHp=100+wave*30;
    ctx.fillStyle='#333';ctx.fillRect(z.x-15,z.y-28,30,4);
    ctx.fillStyle='#f44';ctx.fillRect(z.x-15,z.y-28,30*(z.hp/maxHp),4);
  });

  // 豌豆
  peas.forEach(pe=>{
    ctx.fillStyle='#76ff03';ctx.beginPath();
    ctx.arc(pe.x,pe.y,6,0,Math.PI*2);ctx.fill();
  });

  // 阳光
  suns.forEach(s=>{
    ctx.fillStyle='#ffd700';ctx.beginPath();
    ctx.arc(s.x,s.y,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff3b0';ctx.beginPath();
    ctx.arc(s.x,s.y,6,0,Math.PI*2);ctx.fill();
  });

  // 粒子
  particles.forEach(p=>{
    ctx.fillStyle=p.color;ctx.globalAlpha=p.life/40;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  });
  ctx.globalAlpha=1;

  // 左侧危险区
  const grad=ctx.createLinearGradient(OFFX-20,0,OFFX,0);
  grad.addColorStop(0,'rgba(255,0,0,.15)');grad.addColorStop(1,'rgba(255,0,0,0)');
  ctx.fillStyle=grad;ctx.fillRect(OFFX-20,OFFY,20,ROWS*CELL_H);
}

function updateUI(){
  document.getElementById('sun').textContent=sun;
  document.getElementById('score').textContent=score;
  document.getElementById('wave').textContent=wave;
  // 更新卡片可用状态
  document.querySelectorAll('.card').forEach(c=>{
    const t=c.dataset.plant;
    if(t&&t!=='shovel'&&PD[t]&&sun<PD[t].cost)c.style.opacity='0.4';
    else c.style.opacity='1';
  });
}

function endGame(){
  gameOver=true;
  document.getElementById('msg').innerHTML=`💀 游戏结束！坚持了 ${wave} 波 | 得分: ${score} | <a href="javascript:location.reload()" style="color:#ffd700">重新开始</a>`;
}

function gameLoop(){
  update();
  // 更新粒子
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});
  draw();
  updateUI();
  requestAnimationFrame(gameLoop);
}

// ===== 点击收集阳光 =====
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  for(let s of suns){
    if(Math.hypot(mx-s.x,my-s.y)<20){s.collected=true;}
  }
});

gameLoop();
</script>
</body>
</html>
