<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星际射手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif}
canvas{display:block;cursor:none}
#ui{position:fixed;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:30px;z-index:10;pointer-events:none}
#ui span{color:#fff;font-size:1rem;background:rgba(255,255,255,.08);padding:6px 18px;border-radius:14px}
#hpBar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:200px;height:6px;background:rgba(255,255,255,.15);border-radius:3px;z-index:10}
#hpFill{height:100%;background:linear-gradient(90deg,#f44,#ff0,#0f0);border-radius:3px;transition:width .2s}
#over{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:20;flex-direction:column;justify-content:center;align-items:center}
#over.show{display:flex}
#over h2{color:#ff0;font-size:2.5rem;margin-bottom:8px}
#over p{color:#fff;margin-bottom:20px}
#over button{font-size:1.2rem;padding:12px 40px;border:none;border-radius:25px;background:#ff0;color:#000;cursor:pointer;font-weight:bold}
#over button:hover{transform:scale(1.06)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <span>⭐ <b id="sc">0</b></span>
  <span>💥 <b id="lv">1</b></span>
  <span>🔥 <b id="combo">x1</b></span>
</div>
<div id="hpBar"><div id="hpFill" style="width:100%"></div></div>
<div id="over"><h2>💀 战机坠毁</h2><p>最终得分: <b id="fs">0</b></p><button onclick="location.reload()">重新起飞</button></div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
resize();window.onresize=resize;

// ===== 游戏状态 =====
let score=0,level=1,combo=1,comboTimer=0,hp=100,maxHp=100,gameOver=false;
let player={x:W/2,y:H-80,w:40,h:40,speed:6};
let bullets=[],enemies=[],particles=[],powerUps=[],stars=[];
let keys={};let shootCD=0,frame=0;

// 星背景
for(let i=0;i<120;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5,sp:Math.random()*0.8+0.2});

// ===== 输入 =====
window.onkeydown=e=>{keys[e.key]=true;e.preventDefault()};
window.onkeyup=e=>{keys[e.key]=false};
c.addEventListener('mousemove',e=>{player.x=e.clientX;player.y=e.clientY});
c.addEventListener('click',()=>{if(gameOver)location.reload()});

// ===== 辅助函数 =====
function spawnParticles(x,y,color,count=8,size=3){
  for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:15+Math.random()*15,color,size:size*Math.random()+1});
}
function rnd(a,b){return Math.random()*(b-a)+a}
function dist(a,b,c,d){return Math.hypot(a-c,b-d)}

// ===== 敌人类型 =====
const ET={
  basic:{hp:1,color:'#f55',size:16,score:10,speed:1.5,emoji:'👾'},
  fast:{hp:1,color:'#f80',size:12,score:15,speed:3,emoji:'🔸'},
  tank:{hp:4,color:'#a5f',size:24,score:40,speed:0.8,emoji:'💀'},
  boss:{hp:15,color:'#f00',size:35,score:200,speed:0.5,emoji:'👿'},
};

function spawnEnemy(type='basic'){
  const t=ET[type];
  enemies.push({
    type,x:rnd(60,W-60),y:-30,hp:t.hp,color:t.color,size:t.size,score:t.score,
    speed:t.speed+rnd(-0.3,0.3),emoji:t.emoji,phase:rnd(0,Math.PI*2),
    shootTimer:type==='tank'?60:0
  });
}

function shoot(){
  bullets.push({x:player.x,y:player.y-20,vx:0,vy:-8,color:'#0ff',size:3});
  // 双发
  if(level>=3){bullets.push({x:player.x-10,y:player.y-15,vx:-0.3,vy:-8,color:'#0ff',size:3})}
  if(level>=3){bullets.push({x:player.x+10,y:player.y-15,vx:0.3,vy:-8,color:'#0ff',size:3})}
  // 五发
  if(level>=7){bullets.push({x:player.x-18,y:player.y-10,vx:-1,vy:-7.5,color:'#ff0',size:2})}
  if(level>=7){bullets.push({x:player.x+18,y:player.y-10,vx:1,vy:-7.5,color:'#ff0',size:2})}
}

// ===== 生成逻辑 =====
function spawnWave(){
  const n=Math.min(3+level,12);
  for(let i=0;i<n;i++){
    const types=['basic','basic','basic','fast','fast','tank'];
    const t=types[Math.floor(Math.random()*types.length)];
    setTimeout(()=>spawnEnemy(t),i*rnd(80,300));
  }
  // Boss 每5关
  if(level%5===0)setTimeout(()=>spawnEnemy('boss'),1500);
}

let waveTimer=0;
function updateSpawn(){
  waveTimer++;
  const interval=Math.max(60,240-level*12);
  if(waveTimer>=interval){waveTimer=0;spawnWave();}
  // 散兵
  if(frame%Math.max(15,50-level*3)===0)spawnEnemy('basic');
  if(frame%Math.max(40,120-level*5)===0&&level>=2)spawnEnemy('fast');
  if(frame%Math.max(90,250-level*10)===0&&level>=4)spawnEnemy('tank');
}

// ===== 道具 =====
function spawnPowerUp(x,y){
  const types=[{color:'#0f0',emoji:'❤️',effect:'heal'},{color:'#ff0',emoji:'⚡',effect:'clear'},{color:'#0ff',emoji:'🛡️',effect:'shield'}];
  const t=types[Math.floor(Math.random()*types.length)];
  powerUps.push({x,y,vy:1.5,color:t.color,emoji:t.emoji,effect:t.effect,size:18,life:400});
}

// ===== 更新 =====
function update(){
  if(gameOver)return;
  frame++;

  // 玩家移动
  if(keys['a']||keys['ArrowLeft'])player.x-=player.speed;
  if(keys['d']||keys['ArrowRight'])player.x+=player.speed;
  if(keys['w']||keys['ArrowUp'])player.y-=player.speed;
  if(keys['s']||keys['ArrowDown'])player.y+=player.speed;
  player.x=Math.max(30,Math.min(W-30,player.x));
  player.y=Math.max(H*0.4,Math.min(H-30,player.y));

  // 射击
  shootCD--;
  if((keys[' ']||keys['j']||true)&&shootCD<=0){shoot();shootCD=Math.max(4,14-level);}

  // 更新子弹
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy});
  bullets=bullets.filter(b=>b.y>-20&&b.y<H+20&&b.x>-20&&b.x<W+20);

  // 更新敌人
  enemies.forEach(e=>{
    e.y+=e.speed;
    if(e.type==='fast')e.x+=Math.sin(e.phase+frame*0.05)*2;
    if(e.type==='boss')e.x+=Math.sin(e.phase+frame*0.03)*1.5;
    // 坦克射击
    if(e.type==='tank'){e.shootTimer--;if(e.shootTimer<=0){e.shootTimer=100;
      enemies.push({type:'ebullet',x:e.x,y:e.y+20,speed:3,color:'#f5f',size:6,hp:1,score:0,emoji:'🔹'});
    }}
    // Boss 散射
    if(e.type==='boss'&&frame%40===0){
      for(let a=-0.5;a<=0.5;a+=0.25)enemies.push({type:'ebullet',x:e.x,y:e.y+30,speed:2.5+a,color:'#f55',size:7,hp:1,score:0,emoji:'🔥',vx:a*2});
    }
  });

  // 碰撞：子弹 vs 敌人
  for(let b of bullets){
    for(let e of enemies){
      if(e.type==='ebullet')continue;
      if(dist(b.x,b.y,e.x,e.y)<e.size+5){
        e.hp--;b.dead=true;spawnParticles(b.x,b.y,'#ff0',3,2);
        if(e.hp<=0){
          e.dead=true;
          score+=e.score*combo;
          spawnParticles(e.x,e.y,e.color,12,4);
          // 道具掉落
          if(Math.random()<0.12)spawnPowerUp(e.x,e.y);
          // combo
          comboTimer=90;combo=Math.min(combo+1,10);
        }
      }
    }
  }
  bullets=bullets.filter(b=>!b.dead);

  // 碰撞：玩家 vs 敌人/子弹
  for(let e of enemies){
    if(dist(player.x,player.y,e.x,e.y)<player.w/2+e.size){
      if(e.type==='ebullet')e.dead=true;
      else{e.hp-=2;e.dead=true;spawnParticles(e.x,e.y,'#f00',15,5)}
      hp-=e.type==='ebullet'?8:15;
      comboTimer=0;combo=1;
      spawnParticles(player.x,player.y,'#fff',5);
      if(hp<=0){hp=0;endGame();return}
    }
  }

  // 道具碰撞
  powerUps.forEach(p=>{p.y+=p.vy;p.life--});
  for(let p of powerUps){
    if(dist(player.x,player.y,p.x,p.y)<player.w/2+p.size){
      if(p.effect==='heal')hp=Math.min(maxHp,hp+25);
      if(p.effect==='clear')enemies.forEach(e=>{if(e.type!=='ebullet'){e.dead=true;score+=e.score}});
      if(p.effect==='shield')hp=Math.min(maxHp,hp+40);
      p.collected=true;spawnParticles(p.x,p.y,p.color,10);
    }
  }
  powerUps=powerUps.filter(p=>!p.collected&&p.life>0&&p.y<H+30);

  // combo衰减
  comboTimer--;if(comboTimer<=0)combo=Math.max(1,combo-1);

  // 清理
  enemies=enemies.filter(e=>!e.dead&&e.y<H+60);
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0});

  // 升级
  const newLevel=Math.floor(score/500)+1;
  if(newLevel>level){level=newLevel;spawnParticles(player.x,player.y,'#ff0',30,8)}

  // 星星滚动
  stars.forEach(s=>{s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W}})

  updateSpawn();
  updateUI();
}

function endGame(){gameOver=true;document.getElementById('fs').textContent=score;document.getElementById('over').classList.add('show')}

function updateUI(){
  document.getElementById('sc').textContent=score;
  document.getElementById('lv').textContent=level;
  document.getElementById('combo').textContent='x'+combo;
  document.getElementById('hpFill').style.width=(hp/maxHp*100)+'%';
}

// ===== 渲染 =====
function draw(){
  ctx.clearRect(0,0,W,H);
  // 星空
  ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ctx.fillStyle=`rgba(255,255,255,${s.s/3})`;ctx.fillRect(s.x,s.y,s.s,s.s)});

  // 粒子
  particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=p.life/30;ctx.fillRect(p.x-1,p.y-1,p.size,p.size)});
  ctx.globalAlpha=1;

  // 道具
  powerUps.forEach(p=>{
    ctx.fillStyle=p.color+'44';ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
    ctx.font='18px serif';ctx.textAlign='center';ctx.fillText(p.emoji,p.x,p.y+6);
  });

  // 子弹
  bullets.forEach(b=>{
    ctx.fillStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=6;
    ctx.fillRect(b.x-2,b.y-6,b.size,b.size*3);ctx.shadowBlur=0;
  });

  // 敌人
  enemies.forEach(e=>{
    const pulse=1+Math.sin(frame*0.1)*0.1;
    ctx.fillStyle=e.color+'44';ctx.beginPath();ctx.arc(e.x,e.y,e.size*pulse,0,Math.PI*2);ctx.fill();
    ctx.font=`${e.size*1.2}px serif`;ctx.textAlign='center';ctx.fillText(e.emoji,e.x,e.y+e.size*0.3);
    // 血条
    if(e.hp>2){ctx.fillStyle='#333';ctx.fillRect(e.x-e.size,e.y-e.size-8,e.size*2,4);
      const maxHp=e.type==='boss'?15:4;ctx.fillStyle='#f44';ctx.fillRect(e.x-e.size,e.y-e.size-8,e.size*2*(e.hp/maxHp),4)}
  });

  // combo 显示
  if(combo>1){
    ctx.fillStyle='#ff0';ctx.font='bold 18px "Segoe UI"';ctx.textAlign='center';
    ctx.fillText(`COMBO x${combo}`,player.x,player.y-40);
  }

  // 玩家
  ctx.fillStyle='#0cf';ctx.shadowColor='#0cf';ctx.shadowBlur=15;
  ctx.beginPath();ctx.moveTo(player.x,player.y-22);ctx.lineTo(player.x-18,player.y+16);ctx.lineTo(player.x+18,player.y+16);ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(player.x,player.y,8,0,Math.PI*2);ctx.fill();
  // 引擎火焰
  const flicker=1+Math.sin(frame*0.5)*0.3;
  ctx.fillStyle='#f80';ctx.shadowColor='#f80';ctx.shadowBlur=10*flicker;
  ctx.beginPath();ctx.moveTo(player.x-8,player.y+14);ctx.lineTo(player.x,player.y+28*flicker);ctx.lineTo(player.x+8,player.y+14);ctx.fill();
  ctx.shadowBlur=0;
}

function loop(){
  update();draw();requestAnimationFrame(loop);
}

updateUI();
loop();
</script>
</body>
</html>
