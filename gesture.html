<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>手势魔法特效</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;height:100vh;font-family:'Segoe UI',sans-serif}
#video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:.85}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
#ui{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:16px;pointer-events:none}
#ui span{background:rgba(0,0,0,.6);color:#fff;padding:8px 18px;border-radius:20px;font-size:.9rem}
#gesture{color:#ffd700!important;font-weight:bold;font-size:1.1rem!important}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:1.5rem;z-index:20;pointer-events:none}
#effect-name{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);color:#fff;font-size:3rem;z-index:15;pointer-events:none;transition:transform.3s,opacity.3s;text-shadow:0 0 30px currentColor;white-space:nowrap}
#effect-name.show{transform:translate(-50%,-50%) scale(1);animation:popIn .6s ease-out forwards}
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
</style>
</head>
<body>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<div id="loading">正在加载手势模型...</div>
<div id="effect-name"></div>
<div id="ui">
  <span id="gesture">🖐️ 等待手势</span>
  <span id="fps">FPS: --</span>
  <span>✋张开 🫴捏合 👆食指 ✌️剪刀 ✊握拳 👍拇指</span>
</div>

<script type="importmap">
{"imports":{"@mediapipe/tasks-vision":"https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/+esm"}}
</script>
<script type="module">
import {HandLandmarker,FilesetResolver} from '@mediapipe/tasks-vision';

const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const loading=document.getElementById('loading');
const gestureEl=document.getElementById('gesture');
const effectName=document.getElementById('effect-name');
const fpsEl=document.getElementById('fps');
let W=canvas.width=innerWidth,H=canvas.height=innerHeight;
window.onresize=()=>{W=canvas.width=innerWidth;H=canvas.height=innerHeight};

// ===== 粒子系统 =====
let particles=[];
class Particle{
  constructor(x,y,opt={}){
    this.x=x;this.y=y;this.vx=(Math.random()-.5)*(opt.speed||4);
    this.vy=(Math.random()-.5)*(opt.speed||4)-(opt.up||0);
    this.life=opt.life||40+Math.random()*40;
    this.maxLife=this.life;
    this.color=opt.color||`hsl(${Math.random()*360},100%,60%)`;
    this.size=opt.size||2+Math.random()*4;
    this.gravity=opt.gravity||0;
    this.friction=opt.friction||.97;
    this.type=opt.type||'circle';
  }
  update(){
    this.x+=this.vx;this.y+=this.vy;
    this.vx*=this.friction;this.vy*=this.friction;
    this.vy+=this.gravity;
    this.life--;
  }
  draw(ctx){
    const alpha=this.life/this.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=this.color;
    if(this.type==='circle'){ctx.beginPath();ctx.arc(this.x,this.y,this.size*alpha,0,Math.PI*2);ctx.fill()}
    else if(this.type==='star'){
      ctx.save();ctx.translate(this.x,this.y);ctx.rotate(Date.now()*.005);
      for(let i=0;i<5;i++){ctx.rotate(Math.PI*2/5);ctx.fillRect(-this.size,-this.size,this.size*2,this.size*2)}ctx.restore();
    }else{ctx.fillRect(this.x-1,this.y-1,2,2)}
    ctx.globalAlpha=1;
  }
}

function emit(x,y,n,opt={}){
  for(let i=0;i<n;i++)particles.push(new Particle(x,y,opt));
}

// ===== 手势识别 =====
function getGesture(lms){
  if(!lms||lms.length===0)return'none';
  // 指尖 vs 指根 (y轴, 数值越小越靠上)
  const tips=[8,12,16,20];const mcp=[5,9,13,17];
  let extended=0;
  const extFingers=[];
  for(let i=0;i<4;i++){
    if(lms[tips[i]].y<lms[mcp[i]].y-.03)extended++;
    extFingers.push(lms[tips[i]].y<lms[mcp[i]].y-.03);
  }

  // 拇指
  const thumbExtended=lms[4].x<lms[3].x-.02; // 拇指尖在拇指关节左侧

  // 捏合检测: 拇指尖和食指尖距离
  const pinchDist=Math.hypot(lms[4].x-lms[8].x,lms[4].y-lms[8].y);

  if(extended>=4&&thumbExtended)return'open';      // 五指张开
  if(extended===0&&!thumbExtended)return'fist';     // 握拳
  if(extFingers[0]&&!extFingers[1]&&!extFingers[2]&&!extFingers[3]&&!thumbExtended)return'point'; // 食指指
  if(extFingers[0]&&extFingers[1]&&!extFingers[2]&&!extFingers[3])return'peace'; // 剪刀手
  if(thumbExtended&&extended===0)return'thumbsup';  // 拇指赞
  if(pinchDist<.04)return'pinch';                   // 捏合

  return'none';
}

// ===== 特效 =====
const gestureNames={open:'✨ 粒子绽放',fist:'💥 暗焰爆裂',point:'🔫 激光射线',peace:'🌈 彩虹星雨',thumbsup:'👍 烟火升空',pinch:'🌀 引力漩涡',none:''};
let prevG='none',effectTimeout=null;

function triggerEffect(gesture,cx,cy){
  if(gesture===prevG)return;
  prevG=gesture;
  // 弹出特效名
  if(gesture!=='none'){
    effectName.textContent=gestureNames[gesture];
    effectName.className='show';
    clearTimeout(effectTimeout);
    effectTimeout=setTimeout(()=>effectName.className='',500);
  }
}

function applyEffect(gesture,cx,cy,timestamp){
  switch(gesture){
  case'open':
    for(let i=0;i<3;i++)emit(cx,cy,2,{speed:5,up:3,color:`hsl(${timestamp*0.3%360},100%,60%)`,size:6,life:50,gravity:.05});
    break;
  case'fist':
    emit(cx,cy,3,{speed:6,color:'#f44',size:8,life:25,type:'star'});
    emit(cx,cy,2,{speed:3,color:'#000',size:15,life:20,type:'circle'});
    break;
  case'point':
    if(Math.random()<.3)emit(cx,cy,1,{speed:15,up:0,color:'#0ff',size:2,life:30,gravity:0,friction:1,type:'line'});
    break;
  case'peace':
    emit(cx,cy,3,{speed:4,up:2,color:`hsl(${Math.random()*360},100%,65%)`,size:5,life:45,gravity:.03,type:'star'});
    break;
  case'thumbsup':
    emit(cx,cy-timestamp%10,4,{speed:7,up:8,color:`hsl(40,100%,${50+Math.random()*50}%)`,size:3,life:35,gravity:.08});
    break;
  case'pinch':
    for(let i=0;i<2;i++){const a=Math.random()*Math.PI*2,r=Math.random()*40;
      emit(cx+Math.cos(a)*r,cy+Math.sin(a)*r,1,{speed:2,up:0,color:'#f0f',size:4,life:60,gravity:.01,type:'circle'});}
    break;
  }
}

// ===== 初始化 =====
async function init(){
  // 摄像头
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'}});
    video.srcObject=stream;
    await video.play();
  }catch(e){loading.textContent='摄像头无法访问: '+e.message;return}

  // MediaPipe
  const vision=await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm');
  const handLandmarker=await HandLandmarker.createFromOptions(vision,{
    baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task',delegate:'GPU'},
    runningMode:'VIDEO',numHands:1
  });

  loading.style.display='none';

  // ===== 主循环 =====
  let lastTime=0,fpsCount=0,fpsTime=0;
  async function loop(timestamp){
    if(timestamp-fpsTime>=1000){fpsEl.textContent='FPS: '+fpsCount;fpsCount=0;fpsTime=timestamp}
    fpsCount++;

    const results=handLandmarker.detectForVideo(video,timestamp);
    let gesture='none',cx=W/2,cy=H*0.4;

    if(results.landmarks&&results.landmarks.length>0){
      const lms=results.landmarks[0];
      gesture=getGesture(lms);
      // 转换坐标到canvas
      const wrist=lms[0];
      cx=W-wrist.x*W;cy=wrist.y*H; // mirror
      gestureEl.textContent=getGestureEmoji(gesture)+' '+gestureNames[gesture];
    }else{
      gestureEl.textContent='🖐️ 等待手势';
      prevG='none';
    }

    triggerEffect(gesture,cx,cy);
    applyEffect(gesture,cx,cy,timestamp);

    // 更新+绘制粒子
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{p.update();p.draw(ctx)});
    particles=particles.filter(p=>p.life>0);
    if(particles.length>300)particles=particles.slice(-250); // 限制粒子数量

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}

function getGestureEmoji(g){
  const map={open:'✋',fist:'✊',point:'👆',peace:'✌️',thumbsup:'👍',pinch:'🤏',none:'🖐️'};
  return map[g]||'🖐️';
}

init();
</script>
</body>
</html>
