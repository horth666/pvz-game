<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ç©؟è¶ٹçپ«ç؛؟ CF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;cursor:none;user-select:none;height:100vh}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;
function rs(){W=c.width=innerWidth;H=c.height=innerHeight}
rs();window.onresize=rs;

// ===== éں³é¢‘ =====
const actx=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,d,t='square',g=0.1){
  const o=actx.createOscillator(),g2=actx.createGain();
  o.type=t;o.frequency.value=f;g2.gain.value=g;
  o.connect(g2);g2.connect(actx.destination);
  o.start();g2.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);
  o.stop(actx.currentTime+d);
}

// ===== و¸¸وˆڈçٹ¶و€پ =====
let mx=W/2,my=H/2,score=0,kills=0,deaths=0,gameOver=false;
let hp=100,maxHp=100,round=1,enemiesRemain=0;
let crossSize=24,recoil=0,shakeTimer=0;

// ===== و­¦ه™¨ =====
const weapons={
  pistol:{name:'و²™و¼ ن¹‹é¹°',dmg:35,ammo:7,mag:7,reload:1.2,fireRate:18,spread:35,recoilAmt:6,color:'#ccc'},
  m4:{name:'M4A1',dmg:28,ammo:30,mag:30,reload:2.0,fireRate:7,spread:18,recoilAmt:3,color:'#666'},
  awm:{name:'AWM',dmg:100,ammo:5,mag:5,reload:3.5,fireRate:60,spread:5,recoilAmt:18,color:'#8B4513'},
};
let curW='m4',w=weapons[curW];
let ammo=w.mag,fireCD=0,reloading=false,reloadTimer=0;

// ===== هœ؛و™¯ه…ƒç´  =====
let enemies=[],muzzleFlash=0,bloodSplats=[],bullets=[];

// ن»“ه؛“èƒŒو™¯ه…ƒç´ 
const bgCrates=[];
for(let i=0;i<12;i++)bgCrates.push({x:Math.random()*W,y:Math.random()*H*0.7+60,w:40+Math.random()*100,h:30+Math.random()*80,color:`hsl(30,20%,${15+Math.random()*20}%)`});

function spawnEnemy(){
  const side=Math.random();
  let ex,ey;
  if(side<0.3){ex=Math.random()*W;ey=-40}
  else if(side<0.6){ex=Math.random()*W;ey=H+40}
  else if(side<0.8){ex=-40;ey=Math.random()*H}
  else{ex=W+40;ey=Math.random()*H}
  enemies.push({
    x:ex,y:ey,tx:Math.random()*(W-200)+100,ty:Math.random()*(H*0.6)+80,hp:1+Math.floor(round/3),
    speed:0.4+Math.random()*0.6,size:22+Math.random()*10,color:`hsl(${Math.random()*20+350},60%,40%)`,
    shootCD:60+Math.random()*80,type:Math.random()<0.2?'heavy':'normal',
    strafe:Math.random()*Math.PI*2,strafeSpeed:0.01+Math.random()*0.02
  });
  enemiesRemain++;
}

function spawnWave(){
  const count=2+round*2;
  for(let i=0;i<count;i++)setTimeout(()=>spawnEnemy(),i*rnd(300,1000));
  enemiesRemain=count;
}

// ===== é¼ و ‡ & è§¦وژ§ =====
c.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
c.addEventListener('click',e=>{if(gameOver){restart();return}fire()});
c.addEventListener('contextmenu',e=>{e.preventDefault()});
window.addEventListener('keydown',e=>{
  if(e.key==='1')switchWeapon('pistol');
  if(e.key==='2')switchWeapon('m4');
  if(e.key==='3')switchWeapon('awm');
  if(e.key==='r')startReload();
  if(e.key===' '||e.key==='f')fire();
});

// ===== و­¦ه™¨و“چن½œ =====
function switchWeapon(k){
  if(reloading||k===curW)return;
  curW=k;w=weapons[k];ammo=w.mag;fireCD=0;reloading=false;
  beep(600,0.08,'square',0.05);
}
function startReload(){
  if(reloading||ammo===w.mag)return;
  reloading=true;reloadTimer=w.reload*60;
}
function fire(){
  if(gameOver||reloading||fireCD>0)return;
  if(ammo<=0){startReload();return}
  ammo--;fireCD=w.fireRate;
  muzzleFlash=4;shakeTimer=8;recoil+=w.recoilAmt;
  beep(rnd(80,150),0.12,'sawtooth',0.08);

  // ه­گه¼¹ه‘½ن¸­و£€وµ‹
  const spreadX=(Math.random()-.5)*w.spread;
  const spreadY=(Math.random()-.5)*w.spread;
  const hitX=mx+spreadX,hitY=my+spreadY;
  bullets.push({x:W/2,y:H/2,tx:hitX,ty:hitY,life:8});

  let hit=false;
  for(let e of enemies){
    const d=Math.hypot(hitX-e.x,hitY-e.y);
    if(d<e.size+8){hit=true;e.hp-=w.dmg;
      bloodSplats.push({x:e.x,y:e.y,life:20,size:e.size});
      if(e.hp<=0){e.dead=true;kills++;score+=100*round;
        enemiesRemain--;beep(200,0.15,'triangle',0.06)}
    }
  }
  if(!hit){beep(400,0.05,'sine',0.03)}
}

// ===== و›´و–° =====
function rnd(a,b){return Math.random()*(b-a)+a}
function dist(a,b,c,d){return Math.hypot(a-c,b-d)}

function update(){
  if(gameOver)return;
  crossSize+=(24-crossSize)*0.2;
  recoil*=0.85;
  if(fireCD>0)fireCD--;
  if(muzzleFlash>0)muzzleFlash--;
  if(shakeTimer>0)shakeTimer--;

  // وچ¢ه¼¹
  if(reloading){reloadTimer--;
    if(reloadTimer<=0){reloading=false;ammo=w.mag;beep(800,0.1,'sine',0.05)}
  }

  // و•Œن؛؛AI
  enemies.forEach(e=>{
    e.strafe+=e.strafeSpeed;
    const sx=Math.sin(e.strafe)*30;
    const dx=e.tx+sx-e.x,dy=e.ty-e.y,dd=Math.hypot(dx,dy);
    if(dd>2){e.x+=dx/dd*e.speed;e.y+=dy/dd*e.speed}
    e.shootCD--;
    if(e.shootCD<=0&&dist(e.x,e.y,W/2,H/2)<400){e.shootCD=60+rnd(20,80);
      if(Math.random()<0.4+round*0.05){hp-=5+round*2;shakeTimer=4;beep(60,0.1,'sawtooth',0.04)}
    }
  });

  // و•Œن؛؛هˆ°è¾¾ن¸­ه؟ƒ
  for(let e of enemies){
    if(dist(e.x,e.y,W/2,H/2)<30){hp-=20;e.dead=true;enemiesRemain--;shakeTimer=10}
  }

  enemies=enemies.filter(e=>!e.dead);
  bloodSplats=bloodSplats.filter(b=>{b.life--;return b.life>0});
  bullets=bullets.filter(b=>{b.life--;return b.life>0});

  if(hp<=0){hp=0;deaths++;endRound()}
  if(enemiesRemain<=0&&enemies.length===0){round++;score+=200;spawnWave()}
}

function endRound(){gameOver=true;beep(100,1,'sawtooth',0.15)}
function restart(){hp=maxHp;score=0;kills=0;deaths=0;round=1;gameOver=false;enemies=[];spawnWave();ammo=w.mag;reloading=false}

// ===== و¸²وں“ =====
function draw(){
  ctx.clearRect(0,0,W,H);

  // èƒŒو™¯
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a1a2e');grad.addColorStop(0.5,'#2a2a3e');grad.addColorStop(1,'#1a1a1a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // هœ°é‌¢
  ctx.fillStyle='#222';ctx.fillRect(0,H*0.72,W,H*0.28);

  // وœ¨ç®±
  bgCrates.forEach(bx=>{
    ctx.fillStyle=bx.color;ctx.fillRect(bx.x,bx.y,bx.w,bx.h);
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.strokeRect(bx.x,bx.y,bx.w,bx.h);
  });

  // و•Œن؛؛ه°„ه‡»ç؛؟ï¼ˆé¢„è­¦ï¼‰
  enemies.forEach(e=>{
    if(dist(e.x,e.y,W/2,H/2)<400){
      ctx.strokeStyle='rgba(255,0,0,.06)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(e.x,e.y);ctx.lineTo(W/2,H/2);ctx.stroke();
    }
  });

  // è،€è؟¹
  bloodSplats.forEach(b=>{
    ctx.fillStyle=`rgba(180,0,0,${b.life/20})`;
    ctx.beginPath();ctx.arc(b.x,b.y,b.size*(1-b.life/40),0,Math.PI*2);ctx.fill();
  });

  // ه­گه¼¹è½¨è؟¹
  bullets.forEach(b=>{
    ctx.strokeStyle='rgba(255,255,100,.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.tx,b.ty);ctx.stroke();
  });

  // و•Œن؛؛
  enemies.forEach(e=>{
    ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(e.x,e.y,e.size,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(e.x-3,e.y-3,e.size*0.25,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e.x+3,e.y-3,e.size*0.25,0,Math.PI*2);ctx.fill();
    // è،€و‌،
    if(e.type==='heavy'){
      ctx.fillStyle='#333';ctx.fillRect(e.x-15,e.y-e.size-8,30,4);
      ctx.fillStyle='#f44';ctx.fillRect(e.x-15,e.y-e.size-8,30*Math.max(0,e.hp/(1+Math.floor(round/3))),4);
    }
  });

  // ه±ڈه¹•وٹ–هٹ¨
  const sx=(Math.random()-.5)*shakeTimer*1.5+(Math.random()-.5)*recoil*0.3;
  const sy=(Math.random()-.5)*shakeTimer*1.5+(Math.random()-.5)*recoil*0.3;

  ctx.save();ctx.translate(sx,sy);

  // ه‡†وکں
  ctx.strokeStyle='#0f0';ctx.lineWidth=2;
  const cs=crossSize;
  ctx.beginPath();ctx.moveTo(mx-cs,my);ctx.lineTo(mx-cs/3,my);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx+cs,my);ctx.lineTo(mx+cs/3,my);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx,my-cs);ctx.lineTo(mx,my-cs/3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx,my+cs);ctx.lineTo(mx,my+cs/3);ctx.stroke();
  ctx.strokeStyle='#f00';ctx.lineWidth=1;ctx.beginPath();ctx.arc(mx,my,5,0,Math.PI*2);ctx.stroke();

  // و‍ھهڈ£çپ«ç„°
  if(muzzleFlash>0){
    ctx.fillStyle=`rgba(255,200,50,${muzzleFlash/4})`;ctx.beginPath();
    ctx.arc(mx+20,my-20,15*muzzleFlash/4,0,Math.PI*2);ctx.fill();
  }

  ctx.restore();

  // ===== HUD =====
  // و­¦ه™¨و ڈ
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(W/2-180,H-70,360,55);
  ctx.strokeStyle='#555';ctx.strokeRect(W/2-180,H-70,360,55);

  Object.entries(weapons).forEach(([k,v],i)=>{
    const wx=W/2-155+i*115;
    ctx.fillStyle=k===curW?'#ff0':'#888';
    ctx.font='bold 14px "Segoe UI"';ctx.textAlign='center';
    ctx.fillText(`${i+1}. ${v.name}`,wx+45,H-48);
    ctx.fillStyle='#aaa';ctx.font='12px "Segoe UI"';
    const a=k===curW?ammo:v.mag;
    ctx.fillText(`[${a}/${v.mag}]`,wx+45,H-28);
    if(k===curW)ctx.strokeStyle='#ff0';else ctx.strokeStyle='#333';
    ctx.strokeRect(wx,H-65,90,45);
  });

  // وچ¢ه¼¹و‌،
  if(reloading){
    const pct=reloadTimer/(w.reload*60);
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(W/2-100,H-92,200,16);
    ctx.fillStyle='#ff0';ctx.fillRect(W/2-98,H-90,196*pct,12);
    ctx.fillStyle='#fff';ctx.font='10px "Segoe UI"';ctx.textAlign='center';
    ctx.fillText('وچ¢ه¼¹ن¸­...',W/2,H-79);
  }

  // è،€é‡ڈ
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(20,20,180,24);
  ctx.fillStyle='#333';ctx.fillRect(22,22,176,20);
  const hpGrad=ctx.createLinearGradient(22,0,22+176,0);
  hpGrad.addColorStop(0,'#f44');hpGrad.addColorStop(0.5,'#ff0');hpGrad.addColorStop(1,'#0f0');
  ctx.fillStyle=hpGrad;ctx.fillRect(22,22,176*(hp/maxHp),20);
  ctx.fillStyle='#fff';ctx.font='bold 12px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText(`HP ${Math.ceil(hp)}`,110,37);

  // ه‡»و‌€/و­»ن؛،/ه›‍هگˆ
  ctx.fillStyle='#fff';ctx.font='bold 16px "Segoe UI"';ctx.textAlign='left';
  ctx.fillText(`âڑ” ${kills}  ًں’€ ${deaths}`,20,65);
  ctx.fillText(`ç¬¬ ${round} ه›‍هگˆ  |  ه‰©ن½™ ${enemiesRemain} و•Œ`,20,88);
  ctx.fillText(`ه¾—هˆ† ${score}`,20,112);

  // وڈگç¤؛
  ctx.fillStyle='#666';ctx.font='11px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText('1/2/3 هˆ‡وچ¢و­¦ه™¨ | R وچ¢ه¼¹ | é¼ و ‡ه·¦é”®/ç©؛و ¼ ه°„ه‡»',W/2,H-8);

  // و¸¸وˆڈç»“و‌ںè’™ç‰ˆ
  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#f00';ctx.font='bold 60px "Segoe UI"';ctx.textAlign='center';
    ctx.fillText('éکµ  ن؛،',W/2,H/2-30);
    ctx.fillStyle='#fff';ctx.font='24px "Segoe UI"';
    ctx.fillText(`ه‡»و‌€: ${kills}  ه¾—هˆ†: ${score}  ç¬¬ ${round} ه›‍هگˆ`,W/2,H/2+25);
    ctx.fillStyle='#ff0';ctx.font='18px "Segoe UI"';
    ctx.fillText('ç‚¹ه‡»ه±ڈه¹•é‡چو–°ه¼€ه§‹',W/2,H/2+60);
  }

  requestAnimationFrame(loop);
}

function loop(){update();draw()}
spawnWave();loop();
</script>
</body>
</html>
